<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>BBD University Registration Form</h1>
    <form action="#">
        <label for="Firstname">First Name:</label>
        <input type="text" placeholder="Enter Your First Name" required> <br><br>
        <label for="Lastname">Last Name:</label>
        <input type="text" placeholder="Enter Your Last Name" required> <br><br>
        <label for="email">Email:</label>
        <input type="mail" placeholder="Enter Your Email" required><br><br>
        <label for="pass">Password:</label>
        <input type="password" placeholder="Enter Your Password" required><br><br>
        <label for="Roll no">Roll no:</label>
        <input type="text" placeholder="Enter Your Roll no" required> <br><br>
        <label for="PhoneNumber">Phone Number:</label>
        <input type="tel" placeholder="Enter Your phone number" required> <br><br>
        <label for="add">Address:</label>
        <input type="text" placeholder="Enter Your Address" required> <br><br>
        <label for="Date">Date:</label>
        <input type="text" placeholder="Enter Date" required> <br><br>
        <label for="DateOfBirth">Date of Birth:</label>
        <input type="Date" placeholder="Enter Date Of Birth" required> <br><br>
        

        <input type="submit"  value ="submit">
        <input type="reset"  value ="reset">
    </form>

</body>
</html>
