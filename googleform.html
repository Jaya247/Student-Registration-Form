<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BBD University Registration Form</h1>
    <form action="#">
        <label for="Firstname">First Name:</label>
        <input type="text" id="Firstname" placeholder="Enter Your First Name" required> <br><br>
        <label for="Lastname">Last Name:</label>
        <input type="text" id="Lastname" placeholder="Enter Your Last Name" required> <br><br>
        <label for="email">Email:</label>
        <input type="mail" id="email" placeholder="Enter Your Email" required><br><br>
        <label for="pass">Password:</label>
        <input type="password" id="pass" placeholder="Enter Your Password" required><br><br>
        <label for="Rollno">Roll no:</label>
        <input type="text" id="Rollno" placeholder="Enter Your Roll no" required> <br><br>
        <label for="PhoneNumber">Phone Number:</label>
        <input type="tel" id="PhoneNumber" placeholder="Enter Your phone number" required> <br><br>
        <label for="add">Address:</label>
        <input type="text" id="add" placeholder="Enter Your Address" required> <br><br>
        <label for="Date">Date:</label>
        <input type="text" id="Date" placeholder="Enter Date" required> <br><br>
        <label for="DateOfBirth">Date of Birth:</label>
        <input type="date" id="DateOfBirth" placeholder="Enter Date Of Birth" required> <br><br>

        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </form>

    <script src="script.js"></script>
</body>
</html>
